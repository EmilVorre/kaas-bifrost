name: Auto Tag

# Runs when next is merged into main.
# Reads conventional commits since the last tag, determines the semver
# bump (fix → patch, feat → minor, BREAKING CHANGE → major), creates
# and pushes the new tag, which then triggers the release workflow.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Conventional commit → semver mapping:
          #   fix:             → patch  (0.0.X)
          #   feat:            → minor  (0.X.0)
          #   BREAKING CHANGE  → major  (X.0.0)
          default_bump: patch
          tag_prefix: v
          release_branches: main
          pre_release_branches: next

      - name: Log new tag
        run: echo "Tagged as ${{ steps.tag.outputs.new_tag }}"
